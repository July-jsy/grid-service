server:
  port: 8080

spring:
  application:
    name: grid-service
  datasource:
    url: jdbc:sqlite:grid-service.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

logging:
  level:
    com.grid: info

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
